name: nodedb_inspector
description: Debug inspector data layer for NodeDB databases
version: 0.0.1
publish_to: none
homepage: https://github.com/virnavi/nodedb
repository: https://github.com/virnavi/nodedb
issue_tracker: https://github.com/virnavi/nodedb/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  inspector_sdk:
    git:
      url: https://github.com/virnavi/nodedb
      ref: "0.0.1"
      path: packages/inspector_sdk
  nodedb:
    git:
      url: https://github.com/virnavi/nodedb
      ref: "0.0.1"
      path: packages/nodedb
  nodedb_ffi:
    git:
      url: https://github.com/virnavi/nodedb
      ref: "0.0.1"
      path: packages/nodedb_ffi

dev_dependencies:
  test: ^1.24.0
  lints: ^4.0.0
