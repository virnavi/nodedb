name: nodedb_inspector_flutter
description: Flutter debug inspector overlay widget for NodeDB databases
version: 0.0.1
publish_to: none
homepage: https://github.com/virnavi/nodedb
repository: https://github.com/virnavi/nodedb
issue_tracker: https://github.com/virnavi/nodedb/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  inspector_sdk:
    git:
      url: https://github.com/virnavi/nodedb
      ref: "0.0.1"
      path: packages/inspector_sdk
  nodedb:
    git:
      url: https://github.com/virnavi/nodedb
      ref: "0.0.1"
      path: packages/nodedb
  nodedb_inspector:
    git:
      url: https://github.com/virnavi/nodedb
      ref: "0.0.1"
      path: packages/nodedb_inspector

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
