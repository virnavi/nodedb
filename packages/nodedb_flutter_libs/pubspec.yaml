name: nodedb_flutter_libs
description: Pre-compiled NodeDB native binaries for Flutter
version: 0.0.1
publish_to: none
homepage: https://github.com/virnavi/nodedb
repository: https://github.com/virnavi/nodedb
issue_tracker: https://github.com/virnavi/nodedb/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      windows:
        ffiPlugin: true
